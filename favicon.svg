<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="0.55" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#4c1d95" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- full-bleed background (maskable-safe) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- white card echoing the app card, within the maskable safe zone -->
  <rect x="150" y="150" width="212" height="212" rx="48" fill="#ffffff" filter="url(#soft)"/>
  <!-- 2x2 grid of math operators -->
  <g font-family="'Segoe UI', 'Rubik', Arial, sans-serif" font-weight="800" font-size="92" text-anchor="middle">
    <text x="207" y="240" fill="#8b5cf6">+</text>
    <text x="305" y="240" fill="#ec4899">−</text>
    <text x="207" y="338" fill="#f59e0b">×</text>
    <text x="305" y="338" fill="#10b981">÷</text>
  </g>
  <!-- sparkle, matching the title's ✨ -->
  <path d="M356 116 L366 150 L400 160 L366 170 L356 204 L346 170 L312 160 L346 150 Z" fill="#ffffff"/>
</svg>
