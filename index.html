<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>קסם החשבון ✨</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= HOME ================= -->
<div class="screen active" id="screen-home">
  <div class="app-title">✨ קסם החשבון ✨</div>
  <div class="app-sub">מי לומדת היום?</div>
  <div id="profileButtons"></div>
  <button class="parents-link" onclick="openGate()">להורים 🔒</button>
</div>

<!-- ================= GAME ================= -->
<div class="screen" id="screen-game">
  <div class="topbar">
    <button class="icon-btn" onclick="goHome()" title="הביתה">🏠</button>
    <div class="chip grow"><span id="gName"></span> <span id="gEmoji"></span></div>
    <button class="icon-btn" onclick="openCollection()" title="האוסף שלי">🏆</button>
    <button class="icon-btn" onclick="openJourney()" title="מפת המסע">🗺️</button>
    <div class="chip" id="streakChip">🔥 <span id="gStreak">0</span></div>
    <div class="chip">⭐ <span id="gStars">0</span></div>
  </div>
  <div class="level-title" id="gLevel" onclick="openJourney()" title="מפת המסע"></div>
  <div class="dots" id="sessionDots"></div>
  <div class="card" id="exCard">
    <div class="prompt" id="exPrompt"></div>
    <div class="visual" id="exVisual"></div>
    <div class="exline" id="exLine"></div>
    <div class="hint" id="exHint"></div>
    <div id="feedback"></div>
    <div class="numpad" id="numpad"></div>
    <div class="choices" id="choices"></div>
  </div>
  <img id="mascot" class="mascot" alt="">
</div>

<!-- ================= CELEBRATE ================= -->
<div class="screen" id="screen-celebrate">
  <div class="celebrate-big" id="celebArt">🎊🌟🎊</div>
  <div class="celebrate-title" id="celebTitle"></div>
  <div class="celebrate-sub" id="celebSub"></div>
  <button class="big-btn" onclick="newSession()">עוד סיבוב! 🚀</button>
  <button class="big-btn ghost" onclick="openJourney()">מפת המסע 🗺️</button>
  <button class="big-btn ghost" onclick="goHome()">הביתה 🏠</button>
</div>

<!-- ================= JOURNEY MAP ================= -->
<div class="screen" id="screen-journey">
  <div class="back-row"><button class="icon-btn" onclick="backToGame()">➡ חזרה</button></div>
  <h2 class="screen-title" id="journeyTitle"></h2>
  <div class="journey" id="journeyPath"></div>
  <button class="big-btn" onclick="backToGame()">ממשיכים! 💪</button>
</div>

<!-- ================= COLLECTION ================= -->
<div class="screen" id="screen-collection">
  <div class="back-row"><button class="icon-btn" onclick="backToGame()">➡ חזרה</button></div>
  <h2 class="screen-title">האוסף שלי 🏆</h2>
  <div class="coll-grid" id="collGrid"></div>
  <div class="coll-progress" id="collProgress"></div>
</div>

<!-- ================= PARENT GATE ================= -->
<div class="screen" id="screen-gate">
  <div class="back-row"><button class="icon-btn" onclick="goHome()">➡ חזרה</button></div>
  <div class="gate-box">
    <div>שאלה למבוגרים בלבד 😉</div>
    <div class="gate-q" id="gateQ"></div>
    <input type="number" id="gateInput" inputmode="numeric">
    <br>
    <button class="big-btn" onclick="checkGate()">כניסה</button>
    <div class="small-note" id="gateMsg"></div>
  </div>
</div>

<!-- ================= PARENTS ================= -->
<div class="screen" id="screen-parents">
  <div class="back-row"><button class="icon-btn" onclick="goHome()">➡ חזרה</button></div>
  <h2 class="screen-title">מסך הורים 📊</h2>
  <div id="parentsPanels"></div>
</div>

<div id="confetti"></div>

<script>
/* ============================================================

const CONFIG = {

        {title:'זוויות וצורות', types:['geo_angles','geo_shapes']},
        {title:'מבחן מסכם 🏆', types:['mul_hard','div','mul_missing','place_value','mental_big','addsub_4digit','order_ops','rounding','sequence','word3','geo_angles','geo_shapes']}
      ]
    },
    raz: {
      name:'רז', emoji:'🦋', color:'#ec4899', grade:'כיתה א׳', input:'numpad',
      trackVersion: 2, startLevel: 2,   // מתחילה ישר מ"חיבור וחיסור עד 20"
      levels: [

    },

      levels: [
        {title:'ספירה עד 5', types:['count5']},

        {title:'ספירה עד 10', types:['count10','digits']},
        {title:'מה גדול יותר?', types:['compare','count10']},
        {title:'חיבור עד 5', types:['tadd5','compare']},

        {title:'הכול ביחד! 💪', types:['count10','digits','compare','tadd5','tadd10']}
      ]
    }
  }
};

const TYPE_NAMES = {
  mul_easy:'כפל 2, 5, 10', mul_mid:'כפל 3, 4, 6', mul_hard:'כפל 7, 8, 9', div:'חילוק',
  addsub100:'חיבור וחיסור עד 100', addsub1000:'חיבור וחיסור עד 1000',
  mul_missing:'כפל וחילוק עם נעלם', place_value:'ערך המקום', mental_big:'חשבון בעל-פה',
  addsub_4digit:'חיבור וחיסור עד 10,000', order_ops:'סדר פעולות', rounding:'עיגול מספרים',
  sequence:'סדרות', word3:'בעיות מילוליות', geo_angles:'זיהוי זוויות', geo_shapes:'זיהוי צורות',
  addsub_tens:'עשרות שלמות עד 100',
  add10:'חיבור עד 10', sub10:'חיסור עד 10', addsub20:'חיבור וחיסור עד 20',
  complete:'השלמת תרגיל', word:'בעיות מילוליות',
  count5:'ספירה עד 5', count10:'ספירה עד 10', digits:'זיהוי ספרות',
  compare:'מה גדול יותר', tadd5:'חיבור עד 5 בתמונות', tadd10:'חיבור עד 10 בתמונות'
};

const COUNT_EMOJIS = ['🍓','🍎','⭐','🎈','🐠','🦋','🌸','🍪','🐤','🧁'];

function ri(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[ri(0, arr.length - 1)]; }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = ri(0, i); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function emojiGroup(e, n, opts) {
  opts = opts || {};
  let s = '';
  for (let i = 1; i <= n; i++) {
    const cls = (opts.crossFrom && i > opts.crossFrom ? ' crossed' : '') + (opts.numbered ? ' numbered' : '');
    const num = opts.numbered ? '<i class="cnt">' + i + '</i>' : '';
    s += '<span class="em' + cls + '">' + e + num + '</span>';
  }
  return '<div class="emoji-group">' + s + '</div>';
}

function dotGrid(cols, rows) {
  let s = '';
  for (let i = 0; i < cols * rows; i++) s += '<span class="dot"></span>';
  return '<div class="dotgrid" style="grid-template-columns:repeat(' + cols + ',13px)">' + s + '</div>';
}

function divGroups(groups, perGroup) {
  let s = '';
  for (let g = 0; g < groups; g++) {
    let d = '';
    for (let i = 0; i < perGroup; i++) d += '<span class="dot"></span>';
    s += '<span class="grp">' + d + '</span>';
  }
  return '<div style="direction:ltr">' + s + '</div>';
}

// אופציות מספריות לבחירה: התשובה + שני מסיחים קרובים, בטווח [lo,hi]
function numOptions(ans, lo, hi) {
  const set = new Set([ans]);
  let guard = 0;
  while (set.size < 3 && guard++ < 200) {
    const v = ri(Math.max(lo, ans - 3), Math.min(hi, ans + 3));
    set.add(v);
  }
  // גיבוי אם הטווח צר מדי
  let extra = lo;
  while (set.size < 3 && extra <= hi) { set.add(extra++); }
  return shuffle([...set]).map(v => ({ label: String(v), value: v }));
}

function fmt(n) { return n.toLocaleString('en-US'); } // פסיק לאלפים, כמו בדפי העבודה

function bigAddSubHint(a, b, op) {
  // פירוק לעשרות/מאות/אלפים כרמז לחישוב בשלבים
  const unit = b >= 1000 ? 1000 : b >= 100 ? 100 : 10;
  const part = Math.floor(b / unit) * unit;
  const rest = b - part;
  if (part === 0 || rest === 0) {
    return op === '+' ? 'נסי לספור קדימה צעד-צעד 🙂' : 'נסי לספור אחורה צעד-צעד 🙂';
  }
  const mid = op === '+' ? a + part : a - part;
  return 'אפשר בשלבים: <span dir="ltr"><b>' + fmt(a) + ' ' + op + ' ' + fmt(part) + ' = ' + fmt(mid) +
         '</b></span> ואז <span dir="ltr"><b>' + fmt(mid) + ' ' + op + ' ' + rest + ' = ?</b></span>';
}

// פירוק מספר לספרות עם שם המקום של כל ספרה, להדגשת ספרה מבוקשת
function digitsHint(n, placeIdx) {
  const s = String(n), names = ['אחדות', 'עשרות', 'מאות', 'אלפים'];
  let cells = '';
  for (let i = 0; i < s.length; i++) {
    const p = s.length - 1 - i, hot = p === placeIdx;
    cells += '<span style="display:inline-block;text-align:center;margin:0 5px">' +
      '<span style="display:block;font-size:1.9rem;font-weight:800;' + (hot ? 'color:#e05690' : '') + '">' + s[i] + '</span>' +
      '<span style="display:block;font-size:.72rem;color:#7c6f93">' + names[p] + '</span></span>';
  }
  return 'כל ספרה והמקום שלה:<div dir="ltr">' + cells + '</div>';
}

// ציור זווית: קרן אופקית + קרן בזווית נתונה, עם קשת (או ריבוע קטן לזווית ישרה)
function angleSVG(deg) {
  const cx = 25, cy = 92, len = 88, rad = deg * Math.PI / 180;
  const x2 = (cx + len * Math.cos(rad)).toFixed(1), y2 = (cy - len * Math.sin(rad)).toFixed(1);
  const r = 24, ex = (cx + r * Math.cos(rad)).toFixed(1), ey = (cy - r * Math.sin(rad)).toFixed(1);
  const mark = deg === 90
    ? '<rect x="' + cx + '" y="' + (cy - 17) + '" width="17" height="17" fill="none" stroke="#e05690" stroke-width="3"/>'
    : '<path d="M ' + (cx + r) + ' ' + cy + ' A ' + r + ' ' + r + ' 0 0 0 ' + ex + ' ' + ey + '" fill="none" stroke="#e05690" stroke-width="3"/>';
  return '<svg width="160" height="110" viewBox="0 0 160 110">' +
    '<line x1="' + cx + '" y1="' + cy + '" x2="' + (cx + len) + '" y2="' + cy + '" stroke="#3b2d52" stroke-width="5" stroke-linecap="round"/>' +
    '<line x1="' + cx + '" y1="' + cy + '" x2="' + x2 + '" y2="' + y2 + '" stroke="#3b2d52" stroke-width="5" stroke-linecap="round"/>' +
    mark + '</svg>';
}

function shapeSVG(name) {
  const S = {
    'משולש':  '<polygon points="60,12 110,98 10,98"/>',
    'ריבוע':   '<rect x="20" y="18" width="80" height="80"/>',
    'מלבן':    '<rect x="8" y="33" width="124" height="56"/>',
    'מעוין':   '<polygon points="60,8 100,55 60,102 20,55"/>',
    'מקבילית': '<polygon points="38,22 130,22 100,95 8,95"/>',
    'טרפז':    '<polygon points="38,20 100,20 128,95 10,95"/>',
    'עיגול':   '<circle cx="60" cy="58" r="46"/>'
  };
  return '<svg width="140" height="112" viewBox="0 0 140 112" style="overflow:visible">' +
    '<g fill="#d8c8f7" stroke="#7c3aed" stroke-width="4" stroke-linejoin="round">' + S[name] + '</g></svg>';
}

const SHAPE_HINTS = {
  'משולש':'למשולש יש 3 צלעות ו-3 קודקודים',
  'ריבוע':'לריבוע 4 צלעות שוות ו-4 זוויות ישרות',
  'מלבן':'למלבן 4 זוויות ישרות, וכל שתי צלעות נגדיות שוות',
  'מעוין':'למעוין 4 צלעות שוות, אבל הזוויות לא ישרות',
  'מקבילית':'במקבילית כל שתי צלעות נגדיות מקבילות ושוות',
  'טרפז':'בטרפז יש בדיוק זוג אחד של צלעות מקבילות',
  'עיגול':'לעיגול אין צלעות ואין פינות 🙂'
};

function mulHint(a, b) {
  let sum = [];
  for (let i = 0; i < Math.min(b, 10); i++) sum.push(a);
  return '<span dir="ltr">' + a + ' × ' + b + '</span> זה ' + b + ' פעמים ' + a +
    ': <span dir="ltr">' + sum.join(' + ') + '</span><br>' + dotGrid(a, b);
}

// יצירת תרגיל לפי סוג. easy=true בזמן חיזוק (גרסה קלה יותר)
function genExercise(type, easy) {
  let a, b, e, e2, n;
  switch (type) {

    /* ---------- נעה ---------- */
    case 'mul_easy': case 'mul_mid': case 'mul_hard': {
      const tables = type === 'mul_easy' ? [2, 5, 10] : type === 'mul_mid' ? [3, 4, 6] : [7, 8, 9];
      a = pick(tables); b = easy ? ri(1, 5) : ri(1, 10);
      return { type, mode:'numpad', prompt:'כמה זה?', line: a + ' × ' + b + ' = ?',
        answer: a * b, hint: mulHint(a, b) };
    }
    case 'div': {
      const d = ri(2, easy ? 5 : 10), q = ri(2, easy ? 5 : 10);
      a = d * q;
      return { type, mode:'numpad', prompt:'כמה זה?', line: a + ' ÷ ' + d + ' = ?',
        answer: q,
        hint:'חילקנו ' + a + ' נקודות לקבוצות של ' + d + '. כמה קבוצות יצאו?' + divGroups(q, d) };
    }
    case 'addsub100': case 'addsub1000': {
      const max = type === 'addsub100' ? (easy ? 20 : 100) : (easy ? 100 : 1000);
      if (Math.random() < 0.5) {
        a = ri(2, max - 2); b = ri(1, max - a);
        return { type, mode:'numpad', prompt:'כמה זה?', line: a + ' + ' + b + ' = ?',
          answer: a + b, hint: bigAddSubHint(a, b, '+') };
      } else {
        a = ri(3, max); b = ri(1, a - 1);
        return { type, mode:'numpad', prompt:'כמה זה?', line: a + ' − ' + b + ' = ?',
          answer: a - b, hint: bigAddSubHint(a, b, '−') };
      }
    }

    case 'place_value': {
      const len = easy ? ri(2, 3) : ri(3, 4);
      n = ri(Math.pow(10, len - 1), Math.pow(10, len) - 1);
      const names = ['האחדות', 'העשרות', 'המאות', 'האלפים'];
      const place = ri(0, len - 1);
      return { type, mode:'numpad', prompt:'מהי ספרת ' + names[place] + ' במספר ' + fmt(n) + '?',
        line:'?', answer: Math.floor(n / Math.pow(10, place)) % 10,
        meta:{ n, place }, hint: digitsHint(n, place) };
    }
    case 'mul_missing': {
      const f = pick(easy ? [2, 5, 10] : [2, 3, 4, 5, 6, 7, 8, 9, 10]); // הגורם הידוע
      const q = ri(2, easy ? 5 : 10);
      const c = f * q;
      const v = ri(0, 3);
      if (v === 0) return { type, mode:'numpad', prompt:'איזה מספר חסר?', line: f + ' × ? = ' + c,
        answer: q, hint:'אפשר להפוך את התרגיל: <span dir="ltr"><b>' + c + ' ÷ ' + f + ' = ?</b></span>' };
      if (v === 1) return { type, mode:'numpad', prompt:'איזה מספר חסר?', line:'? × ' + f + ' = ' + c,
        answer: q, hint:'אפשר להפוך את התרגיל: <span dir="ltr"><b>' + c + ' ÷ ' + f + ' = ?</b></span>' };
      if (v === 2) return { type, mode:'numpad', prompt:'איזה מספר חסר?', line: c + ' ÷ ? = ' + q,
        answer: f, hint:'אפשר להפוך את התרגיל: <span dir="ltr"><b>' + c + ' ÷ ' + q + ' = ?</b></span>' };
      return { type, mode:'numpad', prompt:'איזה מספר חסר?', line:'? ÷ ' + f + ' = ' + q,
        answer: c, hint:'אפשר להפוך את התרגיל: <span dir="ltr"><b>' + q + ' × ' + f + ' = ?</b></span>' };
    }
    case 'mental_big': {
      const v = easy ? pick([0, 2]) : ri(0, 2);
      if (v === 0) { // 2,900 + 1 / − 1
        const base = (easy ? ri(2, 9) : ri(2, 99)) * 100;
        const plus = Math.random() < 0.5;
        return { type, mode:'numpad', prompt:'פתרי בעל-פה',
          line: fmt(base) + (plus ? ' + 1 = ?' : ' − 1 = ?'),
          answer: plus ? base + 1 : base - 1,
          hint: plus ? 'בדיוק אחד יותר מ-' + fmt(base) + ' 🙂' : 'בדיוק אחד פחות מ-' + fmt(base) + ' 🙂' };
      }
      if (v === 1) { // 1,200 − 60
        const base = ri(2, 12) * 100;
        const tens = ri(2, 9) * 10;
        const plus = Math.random() < 0.5;
        return { type, mode:'numpad', prompt:'פתרי בעל-פה',
          line: fmt(base) + (plus ? ' + ' : ' − ') + tens + ' = ?',
          answer: plus ? base + tens : base - tens,
          hint: bigAddSubHint(base, tens, plus ? '+' : '−') };
      }
      // 48 ÷ 2
      const half = ri(easy ? 6 : 12, easy ? 20 : 49);
      const whole = half * 2;
      const tensPart = Math.floor(whole / 10) * 10, ones = whole % 10;
      const hint = (Math.floor(whole / 10) % 2 === 0 && ones > 0)
        ? 'אפשר בחלקים: חצי מ-' + tensPart + ' ועוד חצי מ-' + ones
        : 'חלקי את ' + whole + ' לשני חלקים שווים';
      return { type, mode:'numpad', prompt:'פתרי בעל-פה', line: whole + ' ÷ 2 = ?',
        answer: half, hint };
    }
    case 'addsub_4digit': {
      const max = easy ? 1000 : 9999;
      if (Math.random() < 0.5) {
        a = ri(100, max - 200); b = ri(100, max - a);
        return { type, mode:'numpad', prompt:'כמה זה?', line: fmt(a) + ' + ' + fmt(b) + ' = ?',
          answer: a + b, hint: bigAddSubHint(a, b, '+') };
      }
      a = ri(500, max); b = ri(100, a - 1);
      return { type, mode:'numpad', prompt:'כמה זה?', line: fmt(a) + ' − ' + fmt(b) + ' = ?',
        answer: a - b, hint: bigAddSubHint(a, b, '−') };
    }
    case 'order_ops': {
      const v = easy ? ri(0, 1) : ri(0, 3);
      let A, B, C, D;
      if (v === 0) { // A − B × C — נבנה מהתשובה אחורה כדי שלא תצא שלילית
        B = ri(2, easy ? 5 : 9); C = ri(2, easy ? 5 : 9);
        const ans = easy ? ri(2, 20) : ri(10, 150);
        A = ans + B * C;
        return { type, mode:'numpad', prompt:'שימי לב לסדר הפעולות!',
          line: A + ' − ' + B + ' × ' + C + ' = ?', answer: ans,
          hint:'כפל לפני חיסור! קודם <span dir="ltr"><b>' + B + ' × ' + C + ' = ' + (B * C) +
            '</b></span>, ואז <span dir="ltr"><b>' + A + ' − ' + (B * C) + ' = ?</b></span>' };
      }
      if (v === 1) { // A + B × C
        B = ri(2, easy ? 5 : 9); C = ri(2, easy ? 5 : 9); A = easy ? ri(2, 20) : ri(10, 900);
        return { type, mode:'numpad', prompt:'שימי לב לסדר הפעולות!',
          line: A + ' + ' + B + ' × ' + C + ' = ?', answer: A + B * C,
          hint:'כפל לפני חיבור! קודם <span dir="ltr"><b>' + B + ' × ' + C + ' = ' + (B * C) + '</b></span>' };
      }
      if (v === 2) { // A + B × (C + D)
        B = ri(2, 5); C = ri(2, 30); D = ri(2, 30); A = ri(10, 900);
        return { type, mode:'numpad', prompt:'שימי לב לסדר הפעולות!',
          line: A + ' + ' + B + ' × (' + C + ' + ' + D + ') = ?', answer: A + B * (C + D),
          hint:'קודם הסוגריים: <span dir="ltr"><b>(' + C + ' + ' + D + ') = ' + (C + D) +
            '</b></span>, אחר כך הכפל, ובסוף החיבור' };
      }
      // A ÷ B × C — משמאל לימין
      B = pick([2, 5, 10]); const q = ri(2, 10); C = ri(2, 9); A = B * q;
      return { type, mode:'numpad', prompt:'שימי לב לסדר הפעולות!',
        line: A + ' ÷ ' + B + ' × ' + C + ' = ?', answer: q * C,
        hint:'כפל וחילוק פותרים משמאל לימין: קודם <span dir="ltr"><b>' + A + ' ÷ ' + B + ' = ' + q + '</b></span>' };
    }
    case 'rounding': {
      const unit = easy ? 10 : pick([10, 100]);
      do { n = unit === 10 ? ri(11, 989) : ri(110, 8990); } while (n % unit === 0);
      const lo = Math.floor(n / unit) * unit, hi = lo + unit;
      return { type, mode:'numpad', prompt:'עגלי ' + (unit === 10 ? 'לעשרות' : 'למאות'),
        line: fmt(n) + ' ≈ ?', answer: (n - lo < unit / 2) ? lo : hi, meta:{ n, unit },
        hint: fmt(n) + ' נמצא בין ' + fmt(lo) + ' ל-' + fmt(hi) + '. למי הוא קרוב יותר?' };
    }
    case 'sequence': {
      const d = easy ? pick([2, 5, 10]) : ri(2, 15);
      const s = ri(1, 20);
      const terms = [0, 1, 2, 3].map(i => s + i * d);
      return { type, mode:'numpad', prompt:'מה המספר הבא בסדרה?',
        line: terms.join(' , ') + ' , ?', answer: s + 4 * d, meta:{ diff: d },
        hint:'הקפיצה היא ' + d + ' בכל פעם: <span dir="ltr"><b>' + terms[3] + ' + ' + d + ' = ?</b></span>' };
    }
    case 'word3': {
      const v = ri(0, 3);
      if (v === 0) { // השוואה: פחות
        a = ri(20, easy ? 40 : 100); b = ri(5, a - 5);
        return { type, mode:'numpad',
          prompt:'לנעה יש ' + a + ' סוכריות 🍬. לדנה יש ' + b + ' סוכריות פחות מנעה. כמה סוכריות יש לדנה?',
          line:'?', answer: a - b,
          hint:'"פחות מ..." זה חיסור: <span dir="ltr"><b>' + a + ' − ' + b + ' = ?</b></span>' };
      }
      if (v === 1) { // השוואה: יותר
        a = ri(20, easy ? 40 : 100); b = ri(5, easy ? 20 : 60);
        return { type, mode:'numpad',
          prompt:'לנעה יש ' + a + ' מדבקות ✨. לרותם יש ' + b + ' מדבקות יותר מנעה. כמה מדבקות יש לרותם?',
          line:'?', answer: a + b,
          hint:'"יותר מ..." זה חיבור: <span dir="ltr"><b>' + a + ' + ' + b + ' = ?</b></span>' };
      }
      if (v === 2) { // מטבעות
        const coin = pick(easy ? [10] : [2, 5, 10]);
        const k = ri(3, easy ? 8 : 12);
        return { type, mode:'numpad',
          prompt:'כמה מטבעות של ' + coin + ' ש״ח צריך כדי לשלם ' + (coin * k) + ' ש״ח? 💰',
          line:'?', answer: k,
          hint:'זה תרגיל חילוק: <span dir="ltr"><b>' + (coin * k) + ' ÷ ' + coin + ' = ?</b></span>' };
      }
      a = ri(3, easy ? 5 : 10); b = ri(2, easy ? 5 : 9);
      return { type, mode:'numpad',
        prompt:'בחבילה אחת יש ' + a + ' מדבקות. נעה קנתה ' + b + ' חבילות 🎁. כמה מדבקות יש לה?',
        line:'?', answer: a * b,
        hint:'זה תרגיל כפל: <span dir="ltr"><b>' + a + ' × ' + b + ' = ?</b></span>' };
    }
    case 'geo_angles': {
      const kinds = [
        { name:'זווית חדה', deg: () => easy ? ri(25, 50) : ri(20, 70) },
        { name:'זווית ישרה', deg: () => 90 },
        { name:'זווית קהה', deg: () => easy ? ri(130, 160) : ri(110, 160) }
      ];
      const k = pick(kinds);
      return { type, mode:'choice', prompt:'איזו זווית זו?', visual: angleSVG(k.deg()),
        answer: k.name,
        options: shuffle(kinds.map(x => ({ label: x.name, value: x.name }))),
        hint:'זווית ישרה היא בדיוק כמו פינה של דף 📄. קטנה ממנה — חדה, גדולה ממנה — קהה.<br>' + angleSVG(90) };
    }
    case 'geo_shapes': {
      const all = easy
        ? ['משולש', 'ריבוע', 'מלבן', 'עיגול']
        : ['משולש', 'ריבוע', 'מלבן', 'מעוין', 'מקבילית', 'טרפז'];
      const target = pick(all);
      const others = shuffle(all.filter(x => x !== target)).slice(0, 2);
      return { type, mode:'choice', prompt:'איך קוראים לצורה הזאת?', visual: shapeSVG(target),
        answer: target,
        options: shuffle([target, ...others].map(x => ({ label: x, value: x }))),
        hint: SHAPE_HINTS[target] };
    }

    /* ---------- רז ---------- */
    case 'addsub_tens': {
      const lim = easy ? 5 : 10; // עשרות
      const t1 = ri(1, lim - 1);
      if (Math.random() < 0.5) {
        const t2 = ri(1, Math.max(1, lim - t1));
        return { type, mode:'numpad', prompt:'כמה זה?', line: (t1 * 10) + ' + ' + (t2 * 10) + ' = ?',
          answer: (t1 + t2) * 10,
          hint: t1 + ' עשרות + ' + t2 + ' עשרות = ' + (t1 + t2) + ' עשרות' };
      }
      const big = ri(2, lim), small = ri(1, big - 1);
      return { type, mode:'numpad', prompt:'כמה זה?', line: (big * 10) + ' − ' + (small * 10) + ' = ?',
        answer: (big - small) * 10,
        hint: big + ' עשרות − ' + small + ' עשרות = ' + (big - small) + ' עשרות' };
    }
    case 'add10': {
      const max = easy ? 5 : 10;
      a = ri(1, max - 1); b = ri(1, max - a); e = pick(COUNT_EMOJIS);
      return { type, mode:'numpad', prompt:'כמה זה?', line: a + ' + ' + b + ' = ?',
        answer: a + b, hint:'ספרי את כולם יחד:<br>' + emojiGroup(e, a) + ' + ' + emojiGroup(e, b) };
    }
    case 'sub10': {
      const max = easy ? 5 : 10;
      a = ri(2, max); b = ri(1, a - 1); e = pick(COUNT_EMOJIS);
      return { type, mode:'numpad', prompt:'כמה זה?', line: a + ' − ' + b + ' = ?',
        answer: a - b,
        hint:'היו ' + a + ' ומחקנו ' + b + '. כמה נשארו בלי איקס?<br>' + emojiGroup(e, a, { crossFrom: a - b }) };
    }
    case 'addsub20': {
      const max = easy ? 10 : 20;
      if (Math.random() < 0.5) {
        a = ri(2, max - 2); b = ri(1, max - a); e = pick(COUNT_EMOJIS);
        return { type, mode:'numpad', prompt:'כמה זה?', line: a + ' + ' + b + ' = ?',
          answer: a + b, hint:'ספרי את כולם יחד:<br>' + emojiGroup(e, a) + ' + ' + emojiGroup(e, b) };
      } else {
        a = ri(3, max); b = ri(1, a - 1); e = pick(COUNT_EMOJIS);
        return { type, mode:'numpad', prompt:'כמה זה?', line: a + ' − ' + b + ' = ?',
          answer: a - b, hint:'כמה נשארו בלי איקס?<br>' + emojiGroup(e, a, { crossFrom: a - b }) };
      }
    }
    case 'complete': {
      const c = ri(easy ? 4 : 5, easy ? 7 : 12);
      b = ri(1, c - 1);
      const missingFirst = Math.random() < 0.5;
      const ans = c - b;
      let circles = '';
      for (let i = 0; i < c; i++) circles += '<span class="circ' + (i < b ? ' full' : '') + '"></span>';
      return { type, mode:'numpad', prompt:'איזה מספר חסר?',
        line: missingFirst ? '? + ' + b + ' = ' + c : b + ' + ? = ' + c,
        answer: ans,
        hint:'יש בסך הכול ' + c + ' עיגולים, ו-' + b + ' כבר צבועים. כמה ריקים?<br><div style="direction:ltr">' + circles + '</div>' };
    }
    case 'word': {
      const max = easy ? 10 : 20;
      if (Math.random() < 0.5) {
        a = ri(2, max - 2); b = ri(1, max - a);
        const t = pick([
          'לרז יש ' + a + ' בלונים 🎈 והיא קיבלה עוד ' + b + '. כמה בלונים יש לה עכשיו?',
          'בסל יש ' + a + ' תפוחים 🍎 ושמנו בו עוד ' + b + '. כמה תפוחים יש בסל?',
          'על העץ ישבו ' + a + ' ציפורים 🐦 והגיעו עוד ' + b + '. כמה ציפורים על העץ?'
        ]);
        return { type, mode:'numpad', prompt: t, line:'?', answer: a + b,
          hint:'אפשר לכתוב את זה כתרגיל: <span dir="ltr"><b>' + a + ' + ' + b + ' = ?</b></span>' };
      } else {
        a = ri(3, max); b = ri(1, a - 1);
        const t = pick([
          'לרז היו ' + a + ' עוגיות 🍪 והיא אכלה ' + b + '. כמה עוגיות נשארו?',
          'על העץ היו ' + a + ' ציפורים 🐦 ו-' + b + ' עפו. כמה ציפורים נשארו?',
          'בקופסה היו ' + a + ' צבעים 🖍️ ו-' + b + ' הלכו לאיבוד. כמה צבעים נשארו?'
        ]);
        return { type, mode:'numpad', prompt: t, line:'?', answer: a - b,
          hint:'אפשר לכתוב את זה כתרגיל: <span dir="ltr"><b>' + a + ' − ' + b + ' = ?</b></span>' };
      }
    }

    /* ---------- צורי ---------- */
    case 'count5': case 'count10': {
      const max = type === 'count5' ? 5 : 10;
      n = ri(1, easy ? Math.min(5, max) : max); e = pick(COUNT_EMOJIS);
      return { type, mode:'choice', prompt:'כמה יש כאן?', visual: emojiGroup(e, n),
        answer: n, options: numOptions(n, 1, max),
        hint:'בואי נספור יחד! לחצי על כל אחד:<br>' + emojiGroup(e, n, { numbered:true }) };
    }
    case 'digits': {
      n = ri(0, 9);
      return { type, mode:'choice', prompt:'לחצי על אותו מספר 👇',
        visual:'<div class="bigdigit">' + n + '</div>',
        answer: n, options: numOptions(n, 0, 9),
        hint:'חפשי בדיוק את אותה צורה:<br><div class="bigdigit small">' + n + '</div>' };
    }
    case 'compare': {
      const hi = easy ? 5 : 9;
      a = ri(1, hi);
      do { b = ri(1, hi); } while (b === a);
      e = pick(COUNT_EMOJIS);
      do { e2 = pick(COUNT_EMOJIS); } while (e2 === e);
      return { type, mode:'choice', prompt:'לחצי איפה שיש יותר 👀',
        answer: Math.max(a, b),
        options: shuffle([
          { html: emojiGroup(e, a), value: a },
          { html: emojiGroup(e2, b), value: b }
        ]),
        hint:'ספרי כל קבוצה:<br>' + emojiGroup(e, a, { numbered:true }) + '<br>' + emojiGroup(e2, b, { numbered:true }) };
    }
    case 'tadd5': case 'tadd10': {
      const max = type === 'tadd5' ? 5 : 10;
      const lim = easy ? Math.max(2, Math.floor(max / 2)) : max;
      a = ri(1, lim - 1); b = ri(1, lim - a); e = pick(COUNT_EMOJIS);
      return { type, mode:'choice', prompt:'כמה ביחד?', emojiLine: true,
        line: e.repeat(a) + ' + ' + e.repeat(b) + ' = ?',
        answer: a + b, options: numOptions(a + b, 1, max),
        hint:'ספרי את כולם ביחד:<br>' + emojiGroup(e, a + b, { numbered:true }) };
    }
  }
  throw new Error('unknown type: ' + type);
}

function defaultState(profile) {
  return {
    level: (profile && profile.startLevel) || 0,
    trackVersion: (profile && profile.trackVersion) || 1,
    stars: 0, streak: 0, bestStreak: 0, consecutive: 0,
    session: { done: 0, correct: 0 },
    stats: {},            // לכל סוג: {c: נכון בניסיון ראשון, w: טעויות}
    wrongRun: {},         // טעויות רצופות לפי סוג
    reinforce: null       // {type, left} בזמן חיזוק
  };
}

// עדכון התקדמות אדפטיבית. correct = נכון בניסיון ראשון. מחזיר אירועים לתצוגה.
function updateProgress(st, type, correct, levelsCount, cfg) {
  const ev = {};
  if (!st.stats[type]) st.stats[type] = { c: 0, w: 0 };
  if (correct) {
    st.stats[type].c++;
    st.consecutive++;
    st.streak++;
    if (st.streak > st.bestStreak) st.bestStreak = st.streak;
    st.wrongRun[type] = 0;
    if (st.reinforce) {
      if (st.reinforce.type === type) {
        st.reinforce.left--;
        if (st.reinforce.left <= 0) { st.reinforce = null; ev.reinforceEnd = true; }
      }
    } else if (st.consecutive >= cfg.levelUpStreak && st.level < levelsCount - 1) {
      st.level++; st.consecutive = 0; ev.levelUp = true;
    }
  } else {
    st.stats[type].w++;
    st.consecutive = 0;
    st.streak = 0;
    st.wrongRun[type] = (st.wrongRun[type] || 0) + 1;
    if (!st.reinforce && st.wrongRun[type] >= cfg.reinforceThreshold) {
      st.reinforce = { type, left: cfg.reinforceCount };
      st.wrongRun[type] = 0;
      ev.reinforceStart = true;
    }
  }
  return ev;
}

// בחירת סוג התרגיל הבא לפי מצב הילדה
function chooseType(profile, st) {
  if (st.reinforce) return { type: st.reinforce.type, easy: true };
  const lvl = profile.levels[Math.min(st.level, profile.levels.length - 1)];
  return { type: pick(lvl.types), easy: false };
}

  }
};

function applyTheme(id) {
  const t = THEMES[id];
  if (t) {
    document.body.dataset.theme = t.key;
  } else {
    delete document.body.dataset.theme;
  }
  // fallback inline למקרה ש-style.css לא נטען; זהה לצבע שהערכה מגדירה
  document.body.style.setProperty('--accent', CONFIG.profiles[id] ? CONFIG.profiles[id].color : '');
  const m = document.getElementById('mascot');
  if (m && t) {
    m.style.display = '';
    m.onerror = () => { m.style.display = 'none'; }; // בלי קובץ — פשוט בלי דמות
    m.src = t.mascot.happy;
    new Image().src = t.mascot.cheer; // טעינה מוקדמת לפוזת החגיגה
  }
}

// פוזה ותגובת אנימציה של הדמות המלווה
function setMascot(pose) {
  const m = document.getElementById('mascot');
  const t = THEMES[curId];
  if (!m || !t || m.style.display === 'none') return;
  m.src = pose === 'cheer' ? t.mascot.cheer : t.mascot.happy;
  m.classList.remove('cheer', 'nudge');
  void m.offsetWidth;
  if (pose === 'cheer' || pose === 'nudge') m.classList.add(pose);
}

function clearTheme() {
  delete document.body.dataset.theme;
  document.body.style.removeProperty('--accent');
}

const $ = id => document.getElementById(id);
let curId = null, st = null, ex = null, attempts = 0, typed = '', locked = false;

function storageKey(id) { return 'math_app_' + id; }

function loadState(id) {
  const p = CONFIG.profiles[id];
  try {
    const raw = localStorage.getItem(storageKey(id));
    if (raw) {
      const parsed = JSON.parse(raw);
      const def = defaultState(p);
      const st = Object.assign(def, parsed, { session: Object.assign({ done: 0, correct: 0 }, parsed.session) });
      // מסלול הרמות השתנה בקוד — שומרים כוכבים וסטטיסטיקות, מתחילים מנקודת הפתיחה החדשה
      const savedVer = parsed.trackVersion || 1;
      if (savedVer !== p.trackVersion) {
        st.trackVersion = p.trackVersion;
        st.level = p.startLevel || 0;
        st.consecutive = 0;
        st.reinforce = null;
        st.wrongRun = {};
        st.session = { done: 0, correct: 0 };
      }
      return st;
    }
  } catch (e) { /* פרופיל חדש */ }
  return defaultState(p);
}
function saveState() { if (curId && st) localStorage.setItem(storageKey(curId), JSON.stringify(st)); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

/* ---------- מסך כניסה ---------- */
function renderHome() {
  const wrap = $('profileButtons');
  wrap.innerHTML = '';
  for (const id in CONFIG.profiles) {
    const p = CONFIG.profiles[id];
    const s = loadState(id);
    const lvl = p.levels[Math.min(s.level, p.levels.length - 1)].title;
    const btn = document.createElement('button');
    const t = THEMES[id];
    btn.className = 'profile-btn';
    btn.style.background = 'linear-gradient(135deg,' + p.color + 'e6,' + p.color + 'b3), url(' + t.bg + ') center/cover';
    btn.innerHTML = '<span class="pe">' + p.emoji + '</span><span><div class="pn">' + p.name +
      '</div><div class="pw">' + t.worldEmoji + ' ' + t.world +
      '</div><div class="pi">' + p.grade + ' · ⭐ ' + s.stars + ' · ' + lvl + '</div></span>';
    btn.onclick = () => startChild(id);
    wrap.appendChild(btn);
  }
}

function goHome() { saveState(); curId = null; clearTheme(); renderHome(); showScreen('screen-home'); }

/* ---------- משחק ---------- */
function startChild(id) {
  curId = id;
  st = loadState(id);
  applyTheme(id);
  showScreen('screen-game');
  updateHud();
  nextExercise();
}

function updateHud() {
  const p = CONFIG.profiles[curId];
  $('gName').textContent = p.name;
  $('gEmoji').textContent = p.emoji;
  $('gStars').textContent = st.stars;
  $('gStreak').textContent = st.streak;
  renderTrail();
  const dots = $('sessionDots');
  dots.innerHTML = '';
  for (let i = 0; i < CONFIG.sessionLength; i++) {
    const d = document.createElement('span');
    if (i < st.session.done) d.classList.add('on');
    dots.appendChild(d);
  }
}

// שביל מיני: נקודה לכל רמה במסלול, הנוכחית פועמת. לחיצה פותחת את מפת המסע.
function renderTrail() {
  const p = CONFIG.profiles[curId];
  const cur = Math.min(st.level, p.levels.length - 1);
  let dots = '';
  for (let i = 0; i < p.levels.length; i++) {
    const last = i === p.levels.length - 1;
    if (last && i !== cur) { dots += '<span class="t final">🏆</span>'; continue; }
    dots += '<span class="t' + (i < cur ? ' done' : i === cur ? ' cur' : '') + '"></span>';
  }
  $('gLevel').innerHTML = '<div class="trail">' + dots + '</div>' +
    '<div class="trail-title">' + p.levels[cur].title +
    (st.reinforce ? ' · מתאמנות על ' + TYPE_NAMES[st.reinforce.type] + ' 💪' : '') + '</div>';
}

/* ---------- מפת המסע ---------- */
function openJourney(justAdvanced) {
  if (!curId) return;
  renderJourney(!!justAdvanced);
  showScreen('screen-journey');
  const c = document.querySelector('#journeyPath .jnode.current');
  if (c) c.scrollIntoView({ block: 'center' });
}

function renderJourney(justAdvanced) {
  const p = CONFIG.profiles[curId], t = THEMES[curId];
  $('journeyTitle').textContent = t.worldEmoji + ' ' + t.world;
  const wrap = $('journeyPath');
  wrap.innerHTML = '';
  const cur = Math.min(st.level, p.levels.length - 1);
  p.levels.forEach((lvl, i) => {
    const state = i < cur ? 'done' : i === cur ? 'current' : 'locked';
    const last = i === p.levels.length - 1;
    const icon = state === 'done' ? t.nodeIcons.done
      : last ? t.nodeIcons.final
      : state === 'current' ? t.nodeIcons.current : t.nodeIcons.locked;
    const node = document.createElement('div');
    node.className = 'jnode ' + state + (i % 2 ? ' alt' : '') +
      (justAdvanced && i === cur ? ' just-advanced' : '');
    node.innerHTML = '<span class="jdot">' + icon + '</span>' +
      '<span class="jlabel">' + lvl.title + '</span>' +
      (state === 'current' ? '<img class="jmascot" src="' + t.mascot.happy + '" onerror="this.remove()" alt="">' : '');
    wrap.appendChild(node); // column-reverse: רמה 1 למטה, מטפסים למעלה
  });
}

function nextExercise() {
  const p = CONFIG.profiles[curId];
  const sel = chooseType(p, st);
  ex = genExercise(sel.type, sel.easy);
  attempts = 0; typed = ''; locked = false;
  $('exPrompt').textContent = ex.prompt || '';
  $('exVisual').innerHTML = ex.visual || '';
  $('exHint').className = 'hint';
  $('exHint').innerHTML = '';
  $('feedback').textContent = '';
  $('feedback').className = '';
  const lineEl = $('exLine');
  lineEl.className = 'exline' + (ex.emojiLine ? ' emoji-line' : '') +
    ((ex.line || '').length > 16 ? ' long' : '');
  if (ex.mode === 'numpad') {
    lineEl.innerHTML = (ex.line || '?').replace('?', '<span class="ansbox" id="ansBox">&nbsp;</span>');
    renderNumpad();
    $('choices').innerHTML = '';
  } else {
    lineEl.innerHTML = ex.line || '';
    lineEl.style.display = ex.line ? 'flex' : 'none';
    $('numpad').innerHTML = '';
    renderChoices();
  }
  lineEl.style.display = (ex.mode === 'numpad' || ex.line) ? 'flex' : 'none';
  setMascot('happy');
  const card = $('exCard');
  card.classList.remove('in'); void card.offsetWidth; card.classList.add('in');
  updateHud();
}

function renderNumpad() {
  const np = $('numpad');
  np.innerHTML = '';
  const keys = ['1','2','3','4','5','6','7','8','9','del','0','ok'];
  keys.forEach(k => {
    const b = document.createElement('button');
    if (k === 'del') { b.className = 'key del'; b.textContent = '⌫'; b.onclick = () => { typed = typed.slice(0, -1); drawTyped(); }; }
    else if (k === 'ok') { b.className = 'key ok'; b.textContent = '✓'; b.onclick = () => { if (typed !== '' && !locked) submitAnswer(Number(typed)); }; }
    else { b.className = 'key'; b.textContent = k; b.onclick = () => { if (typed.length < 4 && !locked) { typed += k; drawTyped(); } }; }
    np.appendChild(b);
  });
  drawTyped();
}
function drawTyped() { const box = $('ansBox'); if (box) box.textContent = typed === '' ? ' ' : typed; }

function renderChoices() {
  const ch = $('choices');
  ch.innerHTML = '';
  ex.options.forEach(o => {
    const b = document.createElement('button');
    b.className = 'choice' + (!o.html && isNaN(o.value) ? ' text' : '');
    b.innerHTML = o.html || o.label;
    b.onclick = () => { if (!locked) submitAnswer(o.value); };
    ch.appendChild(b);
  });
}

/* ---------- בדיקת תשובה ---------- */
function submitAnswer(val) {
  if (val === ex.answer) onCorrect();
  else onWrong();
}

function onCorrect() {
  locked = true;
  playCorrect();
  const p = CONFIG.profiles[curId];
  const firstTry = attempts === 0;
  let leveledUp = false;
  if (firstTry) {
    const ev = updateProgress(st, ex.type, true, p.levels.length, CONFIG);
    if (ev.levelUp) { leveledUp = true; queueBanner('🎉', 'עלית רמה!', p.levels[st.level].title); }
    if (ev.reinforceEnd) queueBanner('💪', 'איזו אלופה!', 'חזרנו למסלול הרגיל');
    if (st.streak >= 3) { const c = $('streakChip'); c.classList.remove('hot'); void c.offsetWidth; c.classList.add('hot'); }
  }
  // כוכב על כל תשובה נכונה
  st.stars++;
  if (st.stars % CONFIG.starsPerAnimal === 0) {
    const idx = st.stars / CONFIG.starsPerAnimal - 1;
    if (idx < CONFIG.animals.length) {
      const an = CONFIG.animals[idx];
      queueBanner(an.e, 'חיה חדשה באוסף!', an.n + ' מצטרפת אלייך');
    }
  }
  st.session.done++;
  if (firstTry) st.session.correct++;
  saveState();
  starFly();
  setMascot('cheer');
  const fb = $('feedback');
  fb.textContent = pick(['נכון! 🎉', 'מעולה! 🌟', 'איזה יופי! 💜', 'בדיוק! 🦄'].concat(THEMES[curId].praise));
  fb.className = 'good';
  updateHud();
  setTimeout(() => {
    if (st.session.done >= CONFIG.sessionLength) endSession();
    else {
      nextExercise();
      // עליית רמה: אחרי הבאנר קופצים למפת המסע לראות את הנקודה החדשה נדלקת
      if (leveledUp) setTimeout(() => openJourney(true), 1200);
    }
  }, 1100);
}

function onWrong() {
  attempts++;
  playWrong();
  setMascot('nudge');
  const p = CONFIG.profiles[curId];
  const card = $('exCard');
  card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
  const fb = $('feedback');
  if (attempts === 1) {
    const ev = updateProgress(st, ex.type, false, p.levels.length, CONFIG);
    if (ev.reinforceStart) queueBanner('💪', 'בואי נתאמן יחד', 'עוד קצת תרגול על ' + TYPE_NAMES[ex.type]);
    saveState();
    fb.textContent = pick(['כמעט! נסי שוב 💗', 'עוד ניסיון קטן 🌷', 'קרוב מאוד! נסי שוב 💫']);
    fb.className = 'bad';
  } else if (attempts < CONFIG.revealAfterAttempts) {
    fb.textContent = 'הנה רמז בשבילך 💡';
    fb.className = 'bad';
    $('exHint').innerHTML = ex.hint || '';
    $('exHint').className = 'hint show';
  } else {
    // אחרי הרבה ניסיונות — מציגים את התשובה וממשיכים בעדינות
    locked = true;
    fb.textContent = 'התשובה היא ' + ex.answer + '. ננסה אחד דומה! 🤗';
    fb.className = 'bad';
    if (ex.mode === 'numpad') { typed = String(ex.answer); drawTyped(); }
    st.session.done++;
    saveState();
    updateHud();
    setTimeout(() => {
      if (st.session.done >= CONFIG.sessionLength) endSession();
      else nextExercise();
    }, 1800);
    return;
  }
  typed = '';
  drawTyped();
  updateHud();
}

/* ---------- סיום סשן ---------- */
function endSession() {
  const correct = st.session.correct;
  st.session = { done: 0, correct: 0 };
  saveState();
  confetti();
  const t = THEMES[curId];
  $('celebArt').innerHTML = '<img class="celeb-mascot" src="' + t.mascot.cheer +
    '" onerror="this.parentNode.textContent=\'🎊🌟🎊\'" alt="">';
  $('celebTitle').textContent = pick(t.praise) + ' כל הכבוד, ' + CONFIG.profiles[curId].name + '!';
  $('celebSub').textContent = 'סיימת ' + CONFIG.sessionLength + ' תרגילים — ' + correct +
    ' נכונים בניסיון ראשון! ⭐ יש לך כבר ' + st.stars + ' כוכבים';
  showScreen('screen-celebrate');
}
function newSession() { showScreen('screen-game'); nextExercise(); }

/* ---------- אוסף ---------- */
function openCollection() {
  const unlocked = Math.floor(st.stars / CONFIG.starsPerAnimal);
  const grid = $('collGrid');
  grid.innerHTML = '';
  CONFIG.animals.forEach((an, i) => {
    const d = document.createElement('div');
    d.className = 'coll-item' + (i < unlocked ? '' : ' locked');
    d.innerHTML = '<div class="ce">' + (i < unlocked ? an.e : '❓') + '</div><div class="cn">' +
      (i < unlocked ? an.n : '?') + '</div>';
    grid.appendChild(d);
  });
  const toNext = CONFIG.starsPerAnimal - (st.stars % CONFIG.starsPerAnimal);
  $('collProgress').textContent = unlocked >= CONFIG.animals.length
    ? 'אספת את כל החיות! 🤩'
    : 'עוד ' + toNext + ' כוכבים ו... חיה חדשה! 🐾';
  showScreen('screen-collection');
}
function backToGame() { showScreen('screen-game'); }

/* ---------- צלילים ---------- */
let audioCtx = null;
function getAudioCtx() {
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return null;
  if (!audioCtx) audioCtx = new AC();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
// צליל בודד: תדר, השהיה מתחילת האפקט, משך, צורת גל ועוצמה
function tone(ctx, freq, delay, dur, type, vol) {
  const t = ctx.currentTime + delay;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t + dur + 0.05);
}
function playCorrect() {
  try {
    const ctx = getAudioCtx(); if (!ctx) return;
    tone(ctx, 523.25, 0,    0.16, 'triangle', 0.22); // דו
    tone(ctx, 659.25, 0.09, 0.16, 'triangle', 0.22); // מי
    tone(ctx, 783.99, 0.18, 0.28, 'triangle', 0.22); // סול
  } catch (e) { /* בלי צליל עדיין הכול עובד */ }
}
function playWrong() {
  try {
    const ctx = getAudioCtx(); if (!ctx) return;
    tone(ctx, 329.63, 0,    0.18, 'sine', 0.16); // "בּוֹפּ" רך ועדין, לא מבהיל
    tone(ctx, 261.63, 0.13, 0.24, 'sine', 0.16);
  } catch (e) { /* בלי צליל עדיין הכול עובד */ }
}

/* ---------- אפקטים ---------- */
let bannerTimer = null;
function queueBanner(big, title, sub) {
  const div = document.createElement('div');
  div.className = 'banner';
  div.innerHTML = '<div class="banner-inner"><span class="big">' + big + '</span>' + title +
    '<div style="font-size:1.1rem;color:#7c6f93;margin-top:4px">' + (sub || '') + '</div></div>';
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2200);
}

function starFly() {
  const s = document.createElement('div');
  s.className = 'starfly';
  s.textContent = '⭐';
  s.style.left = (window.innerWidth / 2 - 24) + 'px';
  s.style.top = (window.innerHeight / 2) + 'px';
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 1000);
}

function confetti() {
  const wrap = $('confetti');
  const colors = ['#f472b6', '#a855f7', '#fbbf24', '#34d399', '#60a5fa', '#fb7185'];
  for (let i = 0; i < 90; i++) {
    const c = document.createElement('div');
    c.className = 'cf';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = pick(colors);
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = (Math.random() * 0.8) + 's';
    c.style.transform = 'rotate(' + ri(0, 360) + 'deg)';
    wrap.appendChild(c);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 5000);
}

/* ---------- מסך הורים ---------- */
let gateAnswer = null;
function openGate() {
  const q = pick(CONFIG.parentQuestions);
  gateAnswer = q.a;
  $('gateQ').textContent = q.q;
  $('gateInput').value = '';
  $('gateMsg').textContent = '';
  showScreen('screen-gate');
}
function checkGate() {
  if (Number($('gateInput').value) === gateAnswer) renderParents();
  else $('gateMsg').textContent = 'לא מדויק... נסו שוב 🙂';
}

function renderParents() {
  const wrap = $('parentsPanels');
  wrap.innerHTML = '';
  for (const id in CONFIG.profiles) {
    const p = CONFIG.profiles[id];
    const s = loadState(id);
    let total = 0, totalC = 0, rows = '', strong = '', weak = '';
    for (const t in s.stats) {
      const c = s.stats[t].c, w = s.stats[t].w, n = c + w;
      total += n; totalC += c;
      const pct = n ? Math.round(100 * c / n) : 0;
      rows += '<div class="stat-row"><span>' + (TYPE_NAMES[t] || t) + '</span>' +
        '<span class="bar"><i style="width:' + pct + '%"></i></span>' +
        '<span dir="ltr">' + pct + '% (' + n + ')</span></div>';
      if (n >= 4 && pct >= 80) strong += '<span class="pill">' + TYPE_NAMES[t] + '</span>';
      if (n >= 4 && pct < 60) weak += '<span class="pill weak">' + TYPE_NAMES[t] + '</span>';
    }
    const pctAll = total ? Math.round(100 * totalC / total) : 0;
    const lvl = p.levels[Math.min(s.level, p.levels.length - 1)].title;
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.innerHTML =
      '<h3>' + p.emoji + ' ' + p.name + ' <span style="font-size:.85rem;color:#a89cc0">(' + p.grade + ')</span></h3>' +
      '<div>רמה נוכחית: <b>' + lvl + '</b> · ⭐ ' + s.stars + ' כוכבים · רצף שיא: ' + s.bestStreak + '</div>' +
      '<div style="margin:6px 0">תרגילים שנפתרו: <b>' + total + '</b> · הצלחה בניסיון ראשון: <b>' + pctAll + '%</b></div>' +
      (strong ? '<div>חזקה ב: ' + strong + '</div>' : '') +
      (weak ? '<div>כדאי לחזק: ' + weak + '</div>' : '') +
      (rows ? '<div style="margin-top:8px">' + rows + '</div>' : '<div style="color:#a89cc0">עדיין אין נתונים — שתתחיל לשחק! 🙂</div>') +
      '<button class="reset-btn" data-id="' + id + '">איפוס פרופיל</button>';
    wrap.appendChild(panel);
  }
  wrap.querySelectorAll('.reset-btn').forEach(b => {
    b.onclick = () => {
      if (b.dataset.confirm) {
        localStorage.removeItem(storageKey(b.dataset.id));
        renderParents();
      } else {
        b.dataset.confirm = '1';
        b.textContent = 'בטוחים? לחצו שוב לאיפוס סופי';
      }
    };
  });
  showScreen('screen-parents');
}

/* ---------- אתחול ---------- */
window.addEventListener('load', () => {
  renderHome();
  const h = location.hash.replace('#', '');
  if (CONFIG.profiles[h]) startChild(h);   // קישור ישיר לפרופיל (וגם לבדיקות)
});
</script>
