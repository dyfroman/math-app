const COUNT_EMOJIS = ['🍓','🍎','⭐','🎈','🐠','🦋','🌸','🍪','🐤','🧁'];

function ri(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[ri(0, arr.length - 1)]; }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = ri(0, i); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function emojiGroup(e, n, opts) {
  opts = opts || {};
  let s = '';
  for (let i = 1; i <= n; i++) {
    const cls = (opts.crossFrom && i > opts.crossFrom ? ' crossed' : '') + (opts.numbered ? ' numbered' : '');
    const num = opts.numbered ? '<i class="cnt">' + i + '</i>' : '';
    s += '<span class="em' + cls + '">' + e + num + '</span>';
  }
  return '<div class="emoji-group">' + s + '</div>';
}

function dotGrid(cols, rows) {
  let s = '';
  for (let i = 0; i < cols * rows; i++) s += '<span class="dot"></span>';
  return '<div class="dotgrid" style="grid-template-columns:repeat(' + cols + ',13px)">' + s + '</div>';
}

function divGroups(groups, perGroup) {
  let s = '';
  for (let g = 0; g < groups; g++) {
    let d = '';
    for (let i = 0; i < perGroup; i++) d += '<span class="dot"></span>';
    s += '<span class="grp">' + d + '</span>';
  }
  return '<div style="direction:ltr">' + s + '</div>';
}

// אופציות מספריות לבחירה: התשובה + שני מסיחים קרובים, בטווח [lo,hi]
function numOptions(ans, lo, hi) {
  const set = new Set([ans]);
  let guard = 0;
  while (set.size < 3 && guard++ < 200) {
    const v = ri(Math.max(lo, ans - 3), Math.min(hi, ans + 3));
    set.add(v);
  }
  // גיבוי אם הטווח צר מדי
  let extra = lo;
  while (set.size < 3 && extra <= hi) { set.add(extra++); }
  return shuffle([...set]).map(v => ({ label: String(v), value: v }));
}

function fmt(n) { return n.toLocaleString('en-US'); } // פסיק לאלפים, כמו בדפי העבודה

function bigAddSubHint(a, b, op) {
  // פירוק לעשרות/מאות/אלפים כרמז לחישוב בשלבים
  const unit = b >= 1000 ? 1000 : b >= 100 ? 100 : 10;
  const part = Math.floor(b / unit) * unit;
  const rest = b - part;
  if (part === 0 || rest === 0) {
    return op === '+' ? 'נַסִּי לִסְפּוֹר קָדִימָה צַעַד-צַעַד 🙂' : 'נַסִּי לִסְפּוֹר אָחוֹרָה צַעַד-צַעַד 🙂';
  }
  const mid = op === '+' ? a + part : a - part;
  return 'אֶפְשָׁר בִּשְׁלַבִּים: <span dir="ltr"><b>' + fmt(a) + ' ' + op + ' ' + fmt(part) + ' = ' + fmt(mid) +
         '</b></span> וְאָז <span dir="ltr"><b>' + fmt(mid) + ' ' + op + ' ' + rest + ' = ?</b></span>';
}

// פירוק מספר לספרות עם שם המקום של כל ספרה, להדגשת ספרה מבוקשת
function digitsHint(n, placeIdx) {
  const s = String(n), names = ['אֲחָדוֹת', 'עֲשָׂרוֹת', 'מֵאוֹת', 'אֲלָפִים', 'עֲשֶׂרֶת אֲלָפִים', 'מֵאוֹת אֲלָפִים'];
  let cells = '';
  for (let i = 0; i < s.length; i++) {
    const p = s.length - 1 - i, hot = p === placeIdx;
    cells += '<span style="display:inline-block;text-align:center;margin:0 5px">' +
      '<span style="display:block;font-size:1.9rem;font-weight:800;' + (hot ? 'color:#e05690' : '') + '">' + s[i] + '</span>' +
      '<span style="display:block;font-size:.72rem;color:#7c6f93">' + names[p] + '</span></span>';
  }
  return 'כָּל סִפְרָה וְהַמָּקוֹם שֶׁלָּהּ:<div dir="ltr">' + cells + '</div>';
}

// ציור זווית: קרן אופקית + קרן בזווית נתונה, עם קשת (או ריבוע קטן לזווית ישרה)
function angleSVG(deg) {
  const cx = 25, cy = 92, len = 88, rad = deg * Math.PI / 180;
  const x2 = (cx + len * Math.cos(rad)).toFixed(1), y2 = (cy - len * Math.sin(rad)).toFixed(1);
  const r = 24, ex = (cx + r * Math.cos(rad)).toFixed(1), ey = (cy - r * Math.sin(rad)).toFixed(1);
  const mark = deg === 90
    ? '<rect x="' + cx + '" y="' + (cy - 17) + '" width="17" height="17" fill="none" stroke="#e05690" stroke-width="3"/>'

function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { const t = b; b = a % b; a = t; } return a || 1; }

// משולש ישר-זווית עם תוויות בסיס וגובה (לשטח משולש)
function triSVG(base, height) {
  const scale = 100 / Math.max(base, height, 1);
  const W = base * scale, H = height * scale, ox = 40, oy = 12;
  const pts = ox + ',' + (oy + H) + ' ' + (ox + W) + ',' + (oy + H) + ' ' + ox + ',' + oy;
  return '<svg width="' + (W + 60) + '" height="' + (H + 38) + '" viewBox="0 0 ' + (W + 60) + ' ' + (H + 38) + '">' +
    '<polygon points="' + pts + '" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>' +
    '<text x="' + (ox + W / 2).toFixed(1) + '" y="' + (oy + H + 18) + '" text-anchor="middle" font-size="15" fill="#4c1d95" font-weight="700">' + base + '</text>' +
    '<text x="' + (ox - 10) + '" y="' + (oy + H / 2).toFixed(1) + '" text-anchor="end" font-size="15" fill="#4c1d95" font-weight="700">' + height + '</text></svg>';
}

// מלבן עם תוויות אורך ורוחב (להיקף ושטח)

  const scale = 120 / Math.max(w, h, 1);
  const W = w * scale, H = h * scale, ox = 14, oy = 22;

// שעון אנלוגי: פנים, 12 סימוני שעות, מחוג שעות קצר ומחוג דקות ארוך
function clockSVG(h, min) {
  const cx = 70, cy = 70, r = 58;
  let ticks = '';
  for (let i = 0; i < 12; i++) {
    const ang = i * 30 * Math.PI / 180;
    const x1 = cx + (r - 8) * Math.sin(ang), y1 = cy - (r - 8) * Math.cos(ang);
    const x2 = cx + r * Math.sin(ang), y2 = cy - r * Math.cos(ang);
    ticks += '<line x1="' + x1.toFixed(1) + '" y1="' + y1.toFixed(1) + '" x2="' + x2.toFixed(1) + '" y2="' + y2.toFixed(1) + '" stroke="#7c3aed" stroke-width="3"/>';
  }
  const minAng = min * 6 * Math.PI / 180;
  const hourAng = ((h % 12) * 30 + min * 0.5) * Math.PI / 180;
  const hx = cx + r * 0.5 * Math.sin(hourAng), hy = cy - r * 0.5 * Math.cos(hourAng);
  const mx = cx + r * 0.78 * Math.sin(minAng), my = cy - r * 0.78 * Math.cos(minAng);
  return '<svg width="140" height="140" viewBox="0 0 140 140">' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="#fff" stroke="#7c3aed" stroke-width="4"/>' + ticks +
    '<line x1="' + cx + '" y1="' + cy + '" x2="' + hx.toFixed(1) + '" y2="' + hy.toFixed(1) + '" stroke="#3b2d52" stroke-width="6" stroke-linecap="round"/>' +
    '<line x1="' + cx + '" y1="' + cy + '" x2="' + mx.toFixed(1) + '" y2="' + my.toFixed(1) + '" stroke="#a855f7" stroke-width="4" stroke-linecap="round"/>' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="4" fill="#3b2d52"/></svg>';
}

        hint:'כָּל חֵלֶק בַּיַּחַס שָׁוֶה <span dir="ltr"><b>' + (r1 * k) + ' ÷ ' + r1 + ' = ' + k + '</b></span>. לַכְּחֻלִּים יֵשׁ ' + r2 + ' חֲלָקִים.' };
    }
    case 'percent_of': {
      const pct = pick([5, 15, 20, 30, 40, 60, 75]);
      const step = 100 / gcd(pct, 100);
      const amount = step * ri(2, easy ? 6 : 15);
      return { type, mode:'numpad', prompt:'כַּמָּה זֶה ' + pct + '% מִתּוֹךְ ' + amount + '?',
        line:'?', answer: amount * pct / 100,
        hint:'אֶפְשָׁר לִמְצֹא 10% (' + amount + ' ÷ 10) וּלְשַׁעֵר, אוֹ לְחַשֵּׁב <span dir="ltr"><b>' + amount + ' × ' + pct + ' ÷ 100</b></span>.' };
    }
    case 'discount': {
      const pct = pick([10, 20, 25, 50]);
      const mult = pct === 10 ? 10 : pct === 20 ? 5 : pct === 25 ? 4 : 2;
      const price = mult * ri(4, easy ? 10 : 30);
      const off = price * pct / 100;
      return { type, mode:'numpad',
        prompt:'מְחִיר חֻלְצָה ' + price + ' ש״ח 👕, וְיֵשׁ הֲנָחָה שֶׁל ' + pct + '%. כַּמָּה תְּשַׁלֵּם?',
        line:'?', answer: price - off,
        hint:'הַהֲנָחָה הִיא ' + pct + '% מִ-' + price + ' = ' + off + ' ש״ח. מַפְחִיתִים מֵהַמְּחִיר.' };
    }
    case 'algebra': {
      const v = ri(0, 2);
      const x = ri(2, easy ? 10 : 20);
      if (v === 0) {
        const b = ri(1, easy ? 10 : 30);
        return { type, mode:'numpad', prompt:'מָצְאִי אֶת הַנֶּעְלָם x',
          visual:'<div class="frac-expr" dir="ltr">x + ' + b + ' = ' + (x + b) + '</div>', line:'?', answer: x,
          hint:'מַעֲבִירִים אֶת ' + b + ' לַצַּד הַשֵּׁנִי: <span dir="ltr"><b>' + (x + b) + ' − ' + b + ' = ?</b></span>' };
      }
      if (v === 1) {
        const b = ri(1, x - 1);
        return { type, mode:'numpad', prompt:'מָצְאִי אֶת הַנֶּעְלָם x',
          visual:'<div class="frac-expr" dir="ltr">x − ' + b + ' = ' + (x - b) + '</div>', line:'?', answer: x,
          hint:'<span dir="ltr"><b>' + (x - b) + ' + ' + b + ' = ?</b></span>' };
      }
      const m = pick([2, 3, 4, 5]);
      return { type, mode:'numpad', prompt:'מָצְאִי אֶת הַנֶּעְלָם x',
        visual:'<div class="frac-expr" dir="ltr">' + m + ' × x = ' + (m * x) + '</div>', line:'?', answer: x,
        hint:'מְחַלְּקִים אֶת שְׁנֵי הַצְּדָדִים בְּ-' + m + ': <span dir="ltr"><b>' + (m * x) + ' ÷ ' + m + ' = ?</b></span>' };
    }
    case 'volume_box': {
      const l = ri(2, easy ? 5 : 8), w = ri(2, easy ? 5 : 8), hh = ri(2, easy ? 4 : 6);
      return { type, mode:'numpad',
        prompt:'מַהוּ הַנֶּפַח שֶׁל תֵּבָה בְּמִדּוֹת ' + l + ' × ' + w + ' × ' + hh + '? (בְּקֻבִּיּוֹת)',
        line:'?', answer: l * w * hh,
        hint:'נֶפַח תֵּבָה = אֹרֶךְ × רֹחַב × גֹּבַהּ: <span dir="ltr"><b>' + l + ' × ' + w + ' × ' + hh + ' = ?</b></span>' };

    /* ---------- רז ---------- */
    case 'addsub_tens': {
      const lim = easy ? 5 : 10; // עשרות
      const t1 = ri(1, lim - 1);

        return { type, mode:'numpad', prompt:'כַּמָּה זֶה?', line: (t1 * 10) + ' + ' + (t2 * 10) + ' = ?',

      }
      const big = ri(2, lim), small = ri(1, big - 1);

        answer: (big - small) * 10,
        hint: big + ' עֲשָׂרוֹת − ' + small + ' עֲשָׂרוֹת = ' + (big - small) + ' עֲשָׂרוֹת' };
    }
    case 'add10': {
      const max = easy ? 5 : 10;
      a = ri(1, max - 1); b = ri(1, max - a); e = pick(COUNT_EMOJIS);
      return { type, mode:'numpad', prompt:'כַּמָּה זֶה?', line: a + ' + ' + b + ' = ?',
        answer: a + b, hint:'סִפְרִי אֶת כּוּלָּם יַחַד:<br>' + emojiGroup(e, a) + ' + ' + emojiGroup(e, b) };
    }
    case 'sub10': {
      const max = easy ? 5 : 10;
      a = ri(2, max); b = ri(1, a - 1); e = pick(COUNT_EMOJIS);
      return { type, mode:'numpad', prompt:'כַּמָּה זֶה?', line: a + ' − ' + b + ' = ?',
        answer: a - b,
        hint:'הָיוּ ' + a + ' וּמָחַקְנוּ ' + b + '. כַּמָּה נִשְׁאֲרוּ בְּלִי אִיקְס?<br>' + emojiGroup(e, a, { crossFrom: a - b }) };
    }
    case 'addsub20': {
      const max = easy ? 10 : 20;
      if (Math.random() < 0.5) {
        a = ri(2, max - 2); b = ri(1, max - a); e = pick(COUNT_EMOJIS);
        return { type, mode:'numpad', prompt:'כַּמָּה זֶה?', line: a + ' + ' + b + ' = ?',
          answer: a + b, hint:'סִפְרִי אֶת כּוּלָּם יַחַד:<br>' + emojiGroup(e, a) + ' + ' + emojiGroup(e, b) };
      } else {
        a = ri(3, max); b = ri(1, a - 1); e = pick(COUNT_EMOJIS);
        return { type, mode:'numpad', prompt:'כַּמָּה זֶה?', line: a + ' − ' + b + ' = ?',
          answer: a - b, hint:'כַּמָּה נִשְׁאֲרוּ בְּלִי אִיקְס?<br>' + emojiGroup(e, a, { crossFrom: a - b }) };
      }
    }
    case 'complete': {
      const c = ri(easy ? 4 : 5, easy ? 7 : 12);
      b = ri(1, c - 1);
      const missingFirst = Math.random() < 0.5;
      const ans = c - b;
      let circles = '';
      for (let i = 0; i < c; i++) circles += '<span class="circ' + (i < b ? ' full' : '') + '"></span>';
      return { type, mode:'numpad', prompt:'אֵיזֶה מִסְפָּר חָסֵר?',
        line: missingFirst ? '? + ' + b + ' = ' + c : b + ' + ? = ' + c,
        answer: ans,
        hint:'יֵשׁ בְּסַךְ הַכֹּל ' + c + ' עִיגּוּלִים, וְ-' + b + ' כְּבָר צְבוּעִים. כַּמָּה רֵיקִים?<br><div style="direction:ltr">' + circles + '</div>' };
    }
    case 'word': {
      const max = easy ? 10 : 20;
      if (Math.random() < 0.5) {
        a = ri(2, max - 2); b = ri(1, max - a);
        const t = pick([
          'לְרָז יֵשׁ ' + a + ' בַּלּוֹנִים 🎈 וְהִיא קִיבְּלָה עוֹד ' + b + '. כַּמָּה בַּלּוֹנִים יֵשׁ לָהּ עַכְשָׁו?',
          'בַּסַּל יֵשׁ ' + a + ' תַּפּוּחִים 🍎 וְשַׂמְנוּ בּוֹ עוֹד ' + b + '. כַּמָּה תַּפּוּחִים יֵשׁ בַּסַּל?',
          'עַל הָעֵץ יָשְׁבוּ ' + a + ' צִיפּוֹרִים 🐦 וְהִגִּיעוּ עוֹד ' + b + '. כַּמָּה צִיפּוֹרִים עַל הָעֵץ?'
        ]);
        return { type, mode:'numpad', prompt: t, line:'?', answer: a + b,
          hint:'אֶפְשָׁר לִכְתּוֹב אֶת זֶה כְּתַרְגִּיל: <span dir="ltr"><b>' + a + ' + ' + b + ' = ?</b></span>' };
      } else {
        a = ri(3, max); b = ri(1, a - 1);
        const t = pick([
          'לְרָז הָיוּ ' + a + ' עוּגִיּוֹת 🍪 וְהִיא אָכְלָה ' + b + '. כַּמָּה עוּגִיּוֹת נִשְׁאֲרוּ?',
          'עַל הָעֵץ הָיוּ ' + a + ' צִיפּוֹרִים 🐦 וְ-' + b + ' עָפוּ. כַּמָּה צִיפּוֹרִים נִשְׁאֲרוּ?',
          'בַּקּוּפְסָה הָיוּ ' + a + ' צְבָעִים 🖍️ וְ-' + b + ' הָלְכוּ לְאִיבּוּד. כַּמָּה צְבָעִים נִשְׁאֲרוּ?'
        ]);
        return { type, mode:'numpad', prompt: t, line:'?', answer: a - b,
          hint:'אֶפְשָׁר לִכְתּוֹב אֶת זֶה כְּתַרְגִּיל: <span dir="ltr"><b>' + a + ' − ' + b + ' = ?</b></span>' };
      }
    }

    /* ---------- צורי ---------- */
    case 'count5': case 'count10': {
      const max = type === 'count5' ? 5 : 10;
      n = ri(1, easy ? Math.min(5, max) : max); e = pick(COUNT_EMOJIS);
      return { type, mode:'choice', prompt:'כַּמָּה יֵשׁ כָּאן?', visual: emojiGroup(e, n),
        answer: n, options: numOptions(n, 1, max),
        hint:'בּוֹאִי נִסְפּוֹר יַחַד! לַחֲצִי עַל כָּל אֶחָד:<br>' + emojiGroup(e, n, { numbered:true }) };
    }
    case 'digits': {
      n = ri(0, 9);
      return { type, mode:'choice', prompt:'לַחֲצִי עַל אוֹתוֹ מִסְפָּר 👇',
        visual:'<div class="bigdigit">' + n + '</div>',
        answer: n, options: numOptions(n, 0, 9),
        hint:'חַפְּשִׂי בְּדִיּוּק אֶת אוֹתָהּ צוּרָה:<br><div class="bigdigit small">' + n + '</div>' };
    }
    case 'compare': {
      const hi = easy ? 5 : 9;
      a = ri(1, hi);
      do { b = ri(1, hi); } while (b === a);
      e = pick(COUNT_EMOJIS);
      do { e2 = pick(COUNT_EMOJIS); } while (e2 === e);
      return { type, mode:'choice', prompt:'לַחֲצִי אֵיפֹה שֶׁיֵּשׁ יוֹתֵר 👀',
        answer: Math.max(a, b),
        options: shuffle([
          { html: emojiGroup(e, a), value: a },
          { html: emojiGroup(e2, b), value: b }
        ]),
        hint:'סִפְרִי כָּל קְבוּצָה:<br>' + emojiGroup(e, a, { numbered:true }) + '<br>' + emojiGroup(e2, b, { numbered:true }) };
    }
    case 'tadd5': case 'tadd10': {
      const max = type === 'tadd5' ? 5 : 10;
      const lim = easy ? Math.max(2, Math.floor(max / 2)) : max;
      a = ri(1, lim - 1); b = ri(1, lim - a); e = pick(COUNT_EMOJIS);
      return { type, mode:'choice', prompt:'כַּמָּה בְּיַחַד?', emojiLine: true,
        line: e.repeat(a) + ' + ' + e.repeat(b) + ' = ?',
        answer: a + b, options: numOptions(a + b, 1, max),
        hint:'סִפְרִי אֶת כּוּלָּם בְּיַחַד:<br>' + emojiGroup(e, a + b, { numbered:true }) };
    }
  }
  throw new Error('unknown type: ' + type);
}

function defaultState(profile) {
  return {
    level: (profile && profile.startLevel) || 0,
    trackVersion: (profile && profile.trackVersion) || 1,
    stars: 0, streak: 0, bestStreak: 0, consecutive: 0,
    session: { done: 0, correct: 0 },
    stats: {},            // לכל סוג: {c: נכון בניסיון ראשון, w: טעויות}
    wrongRun: {},         // טעויות רצופות לפי סוג
    reinforce: null       // {type, left} בזמן חיזוק
  };
}

// עדכון התקדמות אדפטיבית. correct = נכון בניסיון ראשון. מחזיר אירועים לתצוגה.
function updateProgress(st, type, correct, levelsCount, cfg) {
  const ev = {};
  if (!st.stats[type]) st.stats[type] = { c: 0, w: 0 };
  if (correct) {
    st.stats[type].c++;
    st.consecutive++;
    st.streak++;
    if (st.streak > st.bestStreak) st.bestStreak = st.streak;
    st.wrongRun[type] = 0;
    if (st.reinforce) {
      if (st.reinforce.type === type) {
        st.reinforce.left--;
        if (st.reinforce.left <= 0) { st.reinforce = null; ev.reinforceEnd = true; }
      }
    } else if (st.consecutive >= cfg.levelUpStreak && st.level < levelsCount - 1) {
      st.level++; st.consecutive = 0; ev.levelUp = true;
    }
  } else {
    st.stats[type].w++;
    st.consecutive = 0;
    st.streak = 0;
    st.wrongRun[type] = (st.wrongRun[type] || 0) + 1;
    if (!st.reinforce && st.wrongRun[type] >= cfg.reinforceThreshold) {
      st.reinforce = { type, left: cfg.reinforceCount };
      st.wrongRun[type] = 0;
      ev.reinforceStart = true;
    }
  }
  return ev;
}

// בחירת סוג התרגיל הבא לפי מצב הילדה
function chooseType(profile, st) {
  if (st.reinforce) return { type: st.reinforce.type, easy: true };
  const lvl = profile.levels[Math.min(st.level, profile.levels.length - 1)];
  return { type: pick(lvl.types), easy: false };
}

// מבחן מיקום → אינדקס רמת פתיחה. פרופורציוני למספר הנכונות, וחסום כך שלא
// מתחילים על רמת "המבחן המסכם" האחרונה (תמיד נשארת רמה אחת לטיפוס).
function placementStartLevel(correct, total, levelsCount) {
  if (levelsCount <= 1) return 0;
  const maxStart = levelsCount - 2;
  if (maxStart <= 0) return 0;
  const frac = total > 0 ? correct / total : 0;
  return Math.max(0, Math.min(maxStart, Math.round(frac * maxStart)));
}

function applyTheme(themeKey) {
  const t = THEMES[themeKey];
  if (t) {
    document.body.dataset.theme = themeKey;
  } else {
    delete document.body.dataset.theme;
  }
  // fallback inline למקרה ש-style.css לא נטען; זהה לצבע שהערכה מגדירה
  document.body.style.setProperty('--accent', t ? t.color : '');
  const m = document.getElementById('mascot');
  if (m && t) {
    m.style.display = '';
    m.onerror = () => { m.style.display = 'none'; }; // בלי קובץ — פשוט בלי דמות
    m.src = t.mascot.happy;
    new Image().src = t.mascot.cheer; // טעינה מוקדמת לפוזת החגיגה
  }
}

// פוזה ותגובת אנימציה של הדמות המלווה
function setMascot(pose) {
  const m = document.getElementById('mascot');
  const t = curProfile && THEMES[curProfile.themeKey];
  if (!m || !t || m.style.display === 'none') return;
  m.src = pose === 'cheer' ? t.mascot.cheer : t.mascot.happy;
  m.classList.remove('cheer', 'nudge');
  void m.offsetWidth;
  if (pose === 'cheer' || pose === 'nudge') m.classList.add(pose);
}

function clearTheme() {
  delete document.body.dataset.theme;
  document.body.style.removeProperty('--accent');
}

function loadUsers() {

  catch (e) { return []; }
}
function saveUsers(arr) { localStorage.setItem('math_app_users', JSON.stringify(arr)); }

// אובייקט הריצה של הילד הנוכחי: מאחד את פרטי הילד עם מסלול הכיתה שלו
function profileOf(u) {
  const g = CONFIG.grades[u.gradeId] || {}, th = THEMES[u.themeKey] || {};
  return {
    id: u.id, name: u.name, emoji: u.emoji, themeKey: u.themeKey,

function storageKey(id) { return 'math_app_user_' + id; }

function loadState(id) {
  const u = getUser(id);
  const g = u ? CONFIG.grades[u.gradeId] : null;
  try {
    const raw = localStorage.getItem(storageKey(id));
    if (raw) {
      const parsed = JSON.parse(raw);
      const def = defaultState(g);
      const s = Object.assign(def, parsed, { session: Object.assign({ done: 0, correct: 0 }, parsed.session) });
      // מסלול הרמות השתנה בקוד — שומרים כוכבים וסטטיסטיקות, מתחילים מנקודת הפתיחה החדשה
      const savedVer = parsed.trackVersion || 1;
      if (g && savedVer !== g.trackVersion) {
        s.trackVersion = g.trackVersion;
        s.level = g.startLevel || 0;
        s.consecutive = 0;
        s.reinforce = null;
        s.wrongRun = {};
        s.session = { done: 0, correct: 0 };
      }
      return s;
    }
  } catch (e) { /* ילד חדש */ }
  return defaultState(g);
}
function saveState() { if (curId && st) localStorage.setItem(storageKey(curId), JSON.stringify(st)); }

/* ---------- מבחן מיקום ---------- */
let plc = null, plcTyped = '';

function buildPlacementQs(levels, total) {
  const L = levels.length, qs = [];
  for (let k = 0; k < total; k++) {
    const idx = total > 1 ? Math.round(k * (L - 1) / (total - 1)) : 0;
    const lvl = levels[Math.min(idx, L - 1)];
    qs.push(genExercise(pick(lvl.types), false));
  }
  return qs;
}

function startPlacement(userId) {
  const u = getUser(userId);
  if (!u) { goHome(); return; }
  curId = userId;
  curProfile = profileOf(u);
  applyTheme(curProfile.themeKey);
  const total = Math.min(6, curProfile.levels.length + 1);
  plc = { i: 0, total: total, correct: 0, qs: buildPlacementQs(curProfile.levels, total) };
  showScreen('screen-placement');
  renderPlacement();
}

function renderPlacement() {
  const q = plc.qs[plc.i];
  $('plcProg').textContent = 'שאלה ' + (plc.i + 1) + ' מתוך ' + plc.total;
  const dots = $('plcDots');
  dots.innerHTML = '';
  for (let i = 0; i < plc.total; i++) {
    const d = document.createElement('span');
    if (i < plc.i) d.classList.add('on');
    dots.appendChild(d);
  }
  $('plcPrompt').textContent = q.prompt || '';
  $('plcVisual').innerHTML = q.visual || '';
  const line = $('plcLine');
  line.className = 'exline' + (q.emojiLine ? ' emoji-line' : '') + ((q.line || '').length > 16 ? ' long' : '');
  plcTyped = '';
  if (q.mode === 'numpad') {
    line.style.display = 'flex';
    line.innerHTML = (q.line || '?').replace('?', '<span class="ansbox" id="plcBox">&nbsp;</span>');
    $('plcChoices').innerHTML = '';
    renderPlcNumpad();
  } else {
    line.style.display = q.line ? 'flex' : 'none';
    line.innerHTML = q.line || '';
    $('plcNumpad').innerHTML = '';
    renderPlcChoices(q);
  }
  const card = $('plcCard');
  card.classList.remove('in'); void card.offsetWidth; card.classList.add('in');
}

function renderPlcNumpad() {
  const np = $('plcNumpad');
  np.innerHTML = '';
  ['1','2','3','4','5','6','7','8','9','del','0','ok'].forEach(k => {
    const b = document.createElement('button');
    if (k === 'del') { b.className = 'key del'; b.textContent = '⌫'; b.onclick = () => { plcTyped = plcTyped.slice(0, -1); plcDrawTyped(); }; }
    else if (k === 'ok') { b.className = 'key ok'; b.textContent = '✓'; b.onclick = () => { if (plcTyped !== '') plcSubmit(Number(plcTyped)); }; }
    else { b.className = 'key'; b.textContent = k; b.onclick = () => { if (plcTyped.length < 4) { plcTyped += k; plcDrawTyped(); } }; }
    np.appendChild(b);
  });
  plcDrawTyped();
}
function plcDrawTyped() { const box = $('plcBox'); if (box) box.textContent = plcTyped === '' ? ' ' : plcTyped; }

function renderPlcChoices(q) {
  const ch = $('plcChoices');
  ch.innerHTML = '';
  q.options.forEach(o => {
    const b = document.createElement('button');
    b.className = 'choice' + (!o.html && isNaN(o.value) ? ' text' : '');
    b.innerHTML = o.html || o.label;
    b.onclick = () => plcSubmit(o.value);
    ch.appendChild(b);
  });
}

function plcSubmit(val) {
  if (val === plc.qs[plc.i].answer) plc.correct++;
  plc.i++;
  if (plc.i >= plc.total) finishPlacement();
  else renderPlacement();
}

function finishPlacement() {
  const u = getUser(curId);
  const g = CONFIG.grades[u.gradeId];
  const lvls = g.levels || [];
  const start = placementStartLevel(plc.correct, plc.total, lvls.length);
  const s = defaultState(g);
  s.level = start;
  localStorage.setItem(storageKey(curId), JSON.stringify(s));
  startChild(curId);
  const title = lvls.length ? lvls[Math.min(start, lvls.length - 1)].title : '';
  queueBanner('🚀', 'מתחילים, ' + u.name + '!', 'רמת פתיחה: ' + title);
}

// שביל מיני: נקודה לכל רמה במסלול, הנוכחית פועמת. לחיצה פותחת את מפת המסע.
function renderTrail() {
  const p = curProfile;
  const cur = Math.min(st.level, p.levels.length - 1);
  let dots = '';
  for (let i = 0; i < p.levels.length; i++) {
    const last = i === p.levels.length - 1;
    if (last && i !== cur) { dots += '<span class="t final">🏆</span>'; continue; }
    dots += '<span class="t' + (i < cur ? ' done' : i === cur ? ' cur' : '') + '"></span>';
  }
  $('gLevel').innerHTML = '<div class="trail">' + dots + '</div>' +
    '<div class="trail-title">' + p.levels[cur].title +
    (st.reinforce ? ' · מתאמנות על ' + TYPE_NAMES[st.reinforce.type] + ' 💪' : '') + '</div>';

    else { b.className = 'key'; b.textContent = k; b.onclick = () => { if (typed.length < 4 && !locked) { typed += k; drawTyped(); } }; }
    np.appendChild(b);

function drawTyped() { const box = $('ansBox'); if (box) box.textContent = typed === '' ? ' ' : typed; }

  ex.options.forEach(o => {

/* ---------- בדיקת תשובה ---------- */
function submitAnswer(val) {
  if (val === ex.answer) onCorrect();
  else onWrong();
}

function onCorrect() {
  locked = true;
  playCorrect();
  const p = curProfile;
  const firstTry = attempts === 0;
  let leveledUp = false;
  if (firstTry) {
    const ev = updateProgress(st, ex.type, true, p.levels.length, CONFIG);
    if (ev.levelUp) { leveledUp = true; queueBanner('🎉', 'עלית רמה!', p.levels[st.level].title); }
    if (ev.reinforceEnd) queueBanner('💪', 'איזו אלופה!', 'חזרנו למסלול הרגיל');
    if (st.streak >= 3) { const c = $('streakChip'); c.classList.remove('hot'); void c.offsetWidth; c.classList.add('hot'); }
  }
  // כוכב על כל תשובה נכונה
  st.stars++;
  if (st.stars % CONFIG.starsPerAnimal === 0) {
    const idx = st.stars / CONFIG.starsPerAnimal - 1;
    if (idx < CONFIG.animals.length) {
      const an = CONFIG.animals[idx];
      queueBanner(an.e, 'חיה חדשה באוסף!', an.n + ' מצטרפת אלייך');
    }
  }
  st.session.done++;
  if (firstTry) st.session.correct++;
  saveState();
  starFly();
  setMascot('cheer');
  const fb = $('feedback');
  fb.textContent = pick(['נכון! 🎉', 'מעולה! 🌟', 'איזה יופי! 💜', 'בדיוק! 🦄'].concat(THEMES[curProfile.themeKey].praise));
  fb.className = 'good';
  updateHud();
  setTimeout(() => {
    if (st.session.done >= CONFIG.sessionLength) endSession();
    else {
      nextExercise();
      // עליית רמה: אחרי הבאנר קופצים למפת המסע לראות את הנקודה החדשה נדלקת
      if (leveledUp) setTimeout(() => openJourney(true), 1200);
    }
  }, 1100);
}

function onWrong() {
  attempts++;
  playWrong();
  setMascot('nudge');
  const p = curProfile;
  const card = $('exCard');
  card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
  const fb = $('feedback');
  if (attempts === 1) {
    const ev = updateProgress(st, ex.type, false, p.levels.length, CONFIG);
    if (ev.reinforceStart) queueBanner('💪', 'בואי נתאמן יחד', 'עוד קצת תרגול על ' + TYPE_NAMES[ex.type]);
    saveState();
    fb.textContent = pick(['כמעט! נסי שוב 💗', 'עוד ניסיון קטן 🌷', 'קרוב מאוד! נסי שוב 💫']);
    fb.className = 'bad';
  } else if (attempts < CONFIG.revealAfterAttempts) {
    fb.textContent = 'הנה רמז בשבילך 💡';
    fb.className = 'bad';
    $('exHint').innerHTML = ex.hint || '';
    $('exHint').className = 'hint show';
  } else {
    // אחרי הרבה ניסיונות — מציגים את התשובה וממשיכים בעדינות
    locked = true;
    fb.textContent = 'התשובה היא ' + ex.answer + '. ננסה אחד דומה! 🤗';
    fb.className = 'bad';
    if (ex.mode === 'numpad') { typed = String(ex.answer); drawTyped(); }
    st.session.done++;
    saveState();
    updateHud();
    setTimeout(() => {
      if (st.session.done >= CONFIG.sessionLength) endSession();
      else nextExercise();
    }, 1800);
    return;
  }
  typed = '';
  drawTyped();
  updateHud();
}

/* ---------- צלילים ---------- */
let audioCtx = null;
function getAudioCtx() {
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return null;
  if (!audioCtx) audioCtx = new AC();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
// צליל בודד: תדר, השהיה מתחילת האפקט, משך, צורת גל ועוצמה
function tone(ctx, freq, delay, dur, type, vol) {
  const t = ctx.currentTime + delay;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t + dur + 0.05);
}
function playCorrect() {
  try {
    const ctx = getAudioCtx(); if (!ctx) return;
    tone(ctx, 523.25, 0,    0.16, 'triangle', 0.22); // דו
    tone(ctx, 659.25, 0.09, 0.16, 'triangle', 0.22); // מי
    tone(ctx, 783.99, 0.18, 0.28, 'triangle', 0.22); // סול
  } catch (e) { /* בלי צליל עדיין הכול עובד */ }
}
function playWrong() {
  try {
    const ctx = getAudioCtx(); if (!ctx) return;
    tone(ctx, 329.63, 0,    0.18, 'sine', 0.16); // "בּוֹפּ" רך ועדין, לא מבהיל
    tone(ctx, 261.63, 0.13, 0.24, 'sine', 0.16);
  } catch (e) { /* בלי צליל עדיין הכול עובד */ }
}

let gateAnswer = null;

function renderParents() {
  const wrap = $('parentsPanels');
  wrap.innerHTML = '';
  const users = loadUsers();
  if (!users.length) {
    wrap.innerHTML = '<div class="panel" style="color:#a89cc0">עדיין לא נרשמו ילדים 🙂</div>';
    showScreen('screen-parents');
    return;
  }
  for (const u of users) {

    const p = profileOf(u);
    const s = loadState(id);
    let total = 0, totalC = 0, rows = '', strong = '', weak = '';
    for (const t in s.stats) {
      const c = s.stats[t].c, w = s.stats[t].w, n = c + w;
      total += n; totalC += c;
      const pct = n ? Math.round(100 * c / n) : 0;
      rows += '<div class="stat-row"><span>' + (TYPE_NAMES[t] || t) + '</span>' +
        '<span class="bar"><i style="width:' + pct + '%"></i></span>' +
        '<span dir="ltr">' + pct + '% (' + n + ')</span></div>';
      if (n >= 4 && pct >= 80) strong += '<span class="pill">' + TYPE_NAMES[t] + '</span>';
      if (n >= 4 && pct < 60) weak += '<span class="pill weak">' + TYPE_NAMES[t] + '</span>';
    }
    const pctAll = total ? Math.round(100 * totalC / total) : 0;
    const lvl = p.levels[Math.min(s.level, p.levels.length - 1)].title;
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.innerHTML =
      '<h3>' + p.emoji + ' ' + p.name + ' <span style="font-size:.85rem;color:#a89cc0">(' + p.grade + ')</span></h3>' +
      '<div>רמה נוכחית: <b>' + lvl + '</b> · ⭐ ' + s.stars + ' כוכבים · רצף שיא: ' + s.bestStreak + '</div>' +
      '<div style="margin:6px 0">תרגילים שנפתרו: <b>' + total + '</b> · הצלחה בניסיון ראשון: <b>' + pctAll + '%</b></div>' +
      (strong ? '<div>חזקה ב: ' + strong + '</div>' : '') +
      (weak ? '<div>כדאי לחזק: ' + weak + '</div>' : '') +
      (rows ? '<div style="margin-top:8px">' + rows + '</div>' : '<div style="color:#a89cc0">עדיין אין נתונים — שתתחיל לשחק! 🙂</div>') +
      '<div class="panel-actions"><button class="reset-btn" data-id="' + id + '">איפוס התקדמות</button>' +
      '<button class="reset-btn del-btn" data-id="' + id + '">מחיקת ילד</button></div>';
    wrap.appendChild(panel);
  }
  wrap.querySelectorAll('.reset-btn').forEach(b => {
    const isDel = b.classList.contains('del-btn');
    b.onclick = () => {
      if (b.dataset.confirm) {
        if (isDel) {
          saveUsers(loadUsers().filter(u => u.id !== b.dataset.id));
          localStorage.removeItem(storageKey(b.dataset.id));
        } else {
          localStorage.removeItem(storageKey(b.dataset.id));
        }
        renderParents();
      } else {
        b.dataset.confirm = '1';
        b.textContent = isDel ? 'בטוחים? מחיקה סופית' : 'בטוחים? איפוס סופי';
      }
    };
  });
  showScreen('screen-parents');
}

/* ---------- אתחול ---------- */
window.addEventListener('load', () => {
  renderHome();
  const h = location.hash.replace('#', '');
  if (h === 'register') openRegister();        // קיצור להרשמה (גם לבדיקות)
  else if (h && getUser(h)) startChild(h);     // קישור ישיר לילד לפי ה-id שלו
  // רישום service worker — מאפשר התקנה כאפליקציה (standalone) ועבודה אופליין.
  // לא רץ מ-file:// או בבדיקות (navigator לא קיים שם), לכן עטוף בבדיקה.
  if (typeof navigator !== 'undefined' && 'serviceWorker' in navigator && location.protocol.startsWith('http')) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
});
</script>
